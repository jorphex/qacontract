name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Cloudflare secrets
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "API token length: ${#CF_API_TOKEN}"
          echo "Account ID length: ${#CF_ACCOUNT_ID}"
          if [ -z "$CF_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN secret is missing."
            echo "Add it at: Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID secret is missing."
            exit 1
          fi

      - name: Prepare Wrangler config
        run: cp scripts/wrangler.toml.example scripts/wrangler.toml

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: scripts
